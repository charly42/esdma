<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Formulaire de contact ESDMA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; }
    .form-label { display: block; margin-bottom: 4px; font-weight: bold; }
    .form-input { width: 100%; padding: 8px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 4px; }
    .button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .button:hover { background-color: #0056b3; }
  </style>
</head>
<body>

  <h1>Contactez-nous</h1>

  <form id="contactForm">
    <label for="nom" class="form-label">Nom</label>
    <input type="text" id="nom" name="nom" class="form-input" required>

    <label for="prenom" class="form-label">Prénom</label>
    <input type="text" id="prenom" name="prenom" class="form-input" required>

    <label for="email" class="form-label">Email</label>
    <input type="email" id="email" name="email" class="form-input" required>

    <label for="objet" class="form-label">Objet</label>
    <input type="text" id="objet" name="objet" class="form-input" required>

    <label for="contenu" class="form-label">Message</label>
    <textarea id="contenu" name="contenu" class="form-input" rows="5" required></textarea>

    <button type="submit" class="button">Envoyer</button>
  </form>

  <div id="notification" style="margin-top: 20px; display: none; font-weight: bold;"></div>

  <!-- EmailJS -->
  <script src="https://cdn.emailjs.com/sdk/3.11.0/email.min.js"></script>
  <script>
    emailjs.init("3N02RJhmLlaqcJ9I7"); // 🔁 Remplacer par ta Public Key

    document.getElementById("contactForm").addEventListener("submit", function (event) {
      event.preventDefault();
      const form = this;
      const notification = document.getElementById("notification");

      emailjs.sendForm("service_eyjk8ma", "template_neo1tx3", form) // 🔁 Remplacer par tes IDs
        .then(function () {
          notification.style.display = "block";
          notification.style.color = "green";
          notification.textContent = "Message envoyé avec succès !";
          form.reset();
        }, function (error) {
          notification.style.display = "block";
          notification.style.color = "red";
          notification.textContent = "Erreur lors de l'envoi : " + error.text;
        });
    });
  </script>

</body>
</html>
